<script>
  let sonKisaUrl = "";

  async function kisalt() {
    const urlInput = document.getElementById("url");
    const url = urlInput.value.trim();
    if (!url) return;

    const res = await fetch("/kisalt", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url })
    });

    const veri = await res.json();
    if (veri.hata) return alert(veri.hata);

    sonKisaUrl = veri.kisa_url;
    const kutu = document.getElementById("sonuc-kutu");
    const link = document.getElementById("sonuc-url");
    
    if (kutu && link) {
      kutu.classList.remove("gizli");
      kutu.style.display = "flex"; // Garantiye alalım
      link.href = sonKisaUrl;
      link.textContent = sonKisaUrl;
    }
    urlInput.value = "";
    listele();
  }

  async function kopyala() {
    await navigator.clipboard.writeText(sonKisaUrl);
    const btn = document.querySelector(".kopyala-btn");
    if(btn) {
      btn.textContent = "Kopyalandı";
      setTimeout(() => btn.textContent = "Kopyala", 2000);
    }
  }

  async function sil(kod) {
    await fetch(`/sil/${kod}`, { method: "DELETE" });
    listele();
  }

  async function listele() {
    const liste = document.getElementById("liste");
    if (!liste) return; // Hata almanı önleyen kritik kontrol

    const res = await fetch("/api/linkler");
    const linkler = await res.json();
    const host = window.location.host;

    if (linkler.length === 0) {
      liste.innerHTML = '<div class="bos">Henüz link yok.</div>';
      return;
    }

    liste.innerHTML = linkler.map(l => `
      <div class="link-satir">
        <div class="link-bilgi">
          <a class="kisa" href="/${l.kisa_kod}" target="_blank">${host}/${l.kisa_kod}</a>
          <span class="uzun">${l.uzun_url}</span>
        </div>
        <span class="tiklama">${l.tiklanma || 0} tık</span>
        <button class="sil-btn" onclick="sil('${l.kisa_kod}')">Sil</button>
      </div>
    `).join("");
  }

  // Sayfa tamamen hazır olduğunda listeleme yap
  document.addEventListener("DOMContentLoaded", listele);
</script>
